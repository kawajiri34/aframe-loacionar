<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR ナビゲーション</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
    <script src="js/components.js"></script>
  </head>
  <body>
    <!-- ローディング画面 -->
    <div id="loading">
      <div class="spinner"></div>
      <p>読み込み中...</p>
    </div>

    <!-- スポット選択画面 -->
    <div id="spot-select" style="display: none">
      <h2>目的地を選択</h2>
      <div class="spot-list"></div>
    </div>

    <!-- 情報オーバーレイ -->
    <div id="overlay" style="display: none">
      <span id="spot-name" class="spot-name"></span>
      <span id="distance" class="distance">--</span>
    </div>

    <!-- A-Frame ARシーン -->
    <a-scene
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="antialias: true; alpha: true; colorManagement: true"
      fog="type: none"
      embedded
    >
      <a-entity light="type: ambient; color: #FFF; intensity: 1.5"></a-entity>
      <a-entity light="type: directional; color: #FFF; intensity: 0.6" position="0 1 1"></a-entity>
      <a-camera gps-projected-camera rotation-reader></a-camera>
    </a-scene>

    <script>
      // シーン初期化後にレンダラーの背景を完全透明にする
      document.querySelector('a-scene').addEventListener('loaded', function () {
        var renderer = this.renderer;
        renderer.setClearColor(0x000000, 0);
        renderer.autoClear = false;
        // 毎フレーム手動でクリア
        var originalRender = renderer.render.bind(renderer);
        var scene = this.object3D;
        var camera = this.camera;
        renderer.render = function () {
          renderer.clearDepth();
          originalRender(scene, camera);
        };
      });
    </script>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
